name: Build RenderKit

# Run manually from the Actions tab, or automatically when you push a version
# tag like v0.1.0 (a tagged run also publishes a GitHub Release with installers).
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # Builds the app (runs the frontend build + cargo release + bundling).
      # On a tag push, also drafts a GitHub Release with the installers attached.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "RenderKit ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      # Always attach the installers as downloadable workflow artifacts,
      # even for manual (non-tag) runs.
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: renderkit-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
